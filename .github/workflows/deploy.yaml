name: Deploy on self-hosted

on:
  schedule:
    - cron: "0 3 * * *"

  workflow_dispatch:
    inputs:
      server:
        description: "Server to deploy to"
        required: true
        default: "test3"
        type: choice
        options:
          - test2
          - test3
      branch:
        description: "Branch to deploy (test3 only, test2 always deploys main)"
        required: false
        default: "main"
      nuke_db:
        description: "Reset database (Nuke DB)?"
        type: boolean
        default: false

concurrency:
  group: epicstaff-deploy
  cancel-in-progress: false

jobs:
  deploy_test_2:
    name: Deploy to test2
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.server == 'test2') }}
    runs-on: [self-hosted, test2]

    steps:
      - name: Deploy main to test2
        shell: bash
        run: |
          set -euo pipefail
          git config --global --add safe.directory /home/developer/EpicStaff
          cd /home/developer/EpicStaff
          git fetch --prune
          git checkout main
          git pull --ff-only origin main
          export NUKE_DB=false
          bash .github/scripts/deploy.sh main

  deploy_test_3:
    name: Deploy to test3 (manual branch)
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.server == 'test3' }}
    runs-on: [self-hosted, test3]

    steps:
      - name: Deploy selected branch to test3
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ github.event.inputs.branch }}"
          git config --global --add safe.directory /home/developer/EpicStaff
          cd /home/developer/EpicStaff
          git fetch --prune
          git checkout "$BRANCH"
          git pull --ff-only origin "$BRANCH"

          export NUKE_DB="${{ github.event.inputs.nuke_db }}"
          bash .github/scripts/deploy.sh "$BRANCH"
