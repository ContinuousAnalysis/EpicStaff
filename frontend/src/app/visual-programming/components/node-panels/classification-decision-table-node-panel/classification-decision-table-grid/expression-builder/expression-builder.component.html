<div
    class="eb-container"
    [class.eb-container--right]="mode() === 'manipulation'"
>
    <!-- Toolbar row -->
    <div class="eb-toolbar">
        @for (token of tokens(); track token.label) {
            <button
                type="button"
                [class]="'eb-chip eb-chip--' + token.category"
                (mousedown)="$event.preventDefault()"
                (click)="insertToken(token.label)"
            >
                {{ token.label }}
            </button>
        }
    </div>

    <!-- Main body: editor + right panel -->
    <div class="eb-body">
        <!-- Left: textarea + inline mention dropdown -->
        <div class="eb-editor-wrap">
            <textarea
                #editor
                class="eb-editor"
                [value]="displayValue()"
                (input)="onInput($event)"
                (keydown)="onKeydown($event)"
                (click)="onCaretUpdate($event)"
                (keyup)="onCaretUpdate($event)"
                spellcheck="false"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
            ></textarea>

            <!-- @ mention dropdown -->
            @if (mentionActive() && filteredMention().length > 0) {
                <div class="eb-mention-dropdown">
                    @for (v of filteredMention(); track v; let i = $index) {
                        <div
                            class="eb-mention-item"
                            [class.eb-mention-item--active]="i === mentionIndex()"
                            (mousedown)="$event.preventDefault()"
                            (click)="selectMention(v)"
                        >
                            {{ '@' }}{{ v }}
                        </div>
                    }
                </div>
            }
        </div>

        <!-- Divider -->
        <div class="eb-divider"></div>

        <!-- Right: variable panel -->
        <div class="eb-vars-panel">
            <div class="eb-search-wrap">
                <i class="ti ti-search eb-search-icon"></i>
                <input
                    type="text"
                    class="eb-search"
                    placeholder="Search object..."
                    [ngModel]="searchTerm()"
                    (ngModelChange)="searchTerm.set($event)"
                />
            </div>

            <div class="eb-vars-list">
                @for (v of filteredVars(); track v) {
                    <div
                        class="eb-var-row"
                        (mousedown)="$event.preventDefault()"
                        (click)="insertVariable(v)"
                    >
                        {{ '@' }}{{ v }}
                    </div>
                }
            </div>
        </div>
    </div>

    <!-- Quick templates row -->
    <div class="eb-templates-row">
        <span class="eb-templates-label">Quick templates:</span>
        @for (tpl of templates(); track tpl) {
            <button
                type="button"
                class="eb-template-btn"
                disabled
                title="Coming soon"
                aria-disabled="true"
            >
                {{ tpl }}
            </button>
        }
    </div>
</div>
