<form
    class="form"
    [formGroup]="configForm"
>
    <h3 class="form__label">
        MAIN SETTINGS
    </h3>
    <app-custom-input
        formControlName="authToken"
        label="Auth token"
        tooltipText="token"
        placeholder="e.g. https://localhost:8000"
    />

    <app-select
        label="Region"
        formControlName="region"
        [items]="[]"
        placeholder="Select region"
        tooltipText="region"
    />

    <app-custom-input
        formControlName="public_url"
        [required]="true"
        label="Public URL (generated by ngrok)"
        placeholder="https://abc123.ngrok-free.app"
        tooltipText="url"
    />

    <app-expand-panel
        label="Local port"
        tooltipText="port settings"
    >
        <app-custom-input
            formControlName="local_port"
            placeholder="e.g. 8000"
        />
    </app-expand-panel>

    <span class="form__divider"></span>

    <h3 class="form__label">
        TUNNEL SETTINGS
    </h3>

    <app-toggle-switch
        formControlName="web_inspection_interface"
        label="Web Inspection Interface (127.0.0.1.8080)"
        tooltipText="interface"
    />

    <app-toggle-switch
        formControlName="own_domain"
        label="Own domain"
        tooltipText="own domain"
    />

    <app-custom-input
        formControlName="subdomain"
        label="Subdomain"
        placeholder="e.g. my-app.ngrok.io"
        tooltipText="url"
    />

    <app-expand-panel
        label="Local TCP port"
        tooltipText="port settings"
    >
        <app-custom-input
            formControlName="local_tcp_port"
            placeholder="e.g. 8000"
        />
    </app-expand-panel>

    <span class="form__divider"></span>

    <app-toggle-switch
        formControlName="http_basic_auth"
        label="HTTP Basic Auth"
        tooltipText="http auth"
    />

    <div class="form__items-container">
        <app-custom-input
            formControlName="username"
            label="Username"
            placeholder="Username"
            tooltipText="Username"
        />

        <app-custom-input
            formControlName="password"
            label="Password"
            placeholder="Password"
            tooltipText="Password"
        />
    </div>

    <app-listbox
        formControlName="ip_whitelist"
        label="Enter IP address"
        tooltipText="whitelist"
    />

    <span class="form__divider"></span>

    <h3 class="form__label">
        WEBHOOK & TESTING
    </h3>

    <app-toggle-switch
        formControlName="request_reply"
        label="Request Reply"
        tooltipText="request reply"
    />

    <app-toggle-switch
        formControlName="logging_all_requests"
        label="Logging All Requests"
        tooltipText="logging requests"
    />

    <app-expand-panel
        label="ADVANCED SETTINGS"
    >
        <app-custom-input
            formControlName="webhook_verification_token"
            placeholder="Enter your token"
        />

        <textarea style="color: white; background: black"></textarea>

        <app-json-editor/>
    </app-expand-panel>
</form>
