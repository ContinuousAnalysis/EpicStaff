<div class="page">
    <div class="card">
        <app-icon
            icon="logo"
            size="120px"
        />

        <div class="title-section">
            <h1 class="title">Welcome to <span>EpicStaff</span></h1>
            <p class="subtitle">Login to account</p>
        </div>

        <form
            [formGroup]="form"
            class="form"
        >
            <div>
                <app-custom-input
                    label="Username"
                    formControlName="username"
                />
                <app-validation-errors [control]="form.get('username')!"/>
            </div>

            <div>
                <app-custom-input
                    label="Password"
                    type="password"
                    formControlName="password"
                />
                <app-validation-errors [control]="form.get('password')!"/>
            </div>

            <div class="remember-row">
                <app-checkbox/>
                <span>Remember me</span>
            </div>
        </form>

        <app-button
            class="btn"
            (click)="onSubmit()"
        >
            Login
        </app-button>
    </div>

    <p class="prompt">Don’t have an account yet? <span (click)="navToSignUp()">Sign Up</span></p>
</div>
