<div class="storage-details-dialog">
    <div class="storage-details-dialog__header">
        <h2 class="storage-details-dialog__title">{{ title }}</h2>
        <button class="storage-details-dialog__close" type="button" aria-label="Close dialog" (click)="close()">
            <app-icon icon="ui/x" size="1rem"></app-icon>
        </button>
    </div>

    <div class="storage-details-dialog__content">
        <div class="storage-details-dialog__section">
            <div class="storage-details-dialog__section-title">DATA</div>
            <div class="storage-details-dialog__data-grid">
                <div class="storage-details-dialog__cell">
                    <span class="storage-details-dialog__label">Size</span>
                    <span class="storage-details-dialog__value">{{ sizeLabel }}</span>
                </div>
                <div class="storage-details-dialog__cell">
                    <span class="storage-details-dialog__label">Type</span>
                    <span class="storage-details-dialog__value">{{ typeLabel }}</span>
                </div>
                <div class="storage-details-dialog__cell">
                    <span class="storage-details-dialog__label">Modified</span>
                    <span class="storage-details-dialog__value">{{ modifiedAt }}</span>
                </div>
            </div>
        </div>

        <div class="storage-details-dialog__section">
            <div class="storage-details-dialog__section-title">STORAGE PATH</div>
            <div class="storage-details-dialog__path-box">
                <span class="storage-details-dialog__path-value">{{ storagePath }}</span>
                <button
                    class="storage-details-dialog__copy-btn"
                    type="button"
                    aria-label="Copy path"
                    (click)="copyPath()"
                >
                    <app-icon icon="ui/copy" size="0.875rem"></app-icon>
                </button>
            </div>
        </div>

        <div class="storage-details-dialog__section">
            <div class="storage-details-dialog__section-title">USED IN FLOWS</div>
            <div class="storage-details-dialog__chips" *ngIf="usedInFlows.length; else noFlows">
                <span class="storage-details-dialog__chip" *ngFor="let flow of usedInFlows">{{ flow }}</span>
            </div>
            <ng-template #noFlows>
                <div class="storage-details-dialog__empty">Not used in flows</div>
            </ng-template>
        </div>
    </div>
</div>
