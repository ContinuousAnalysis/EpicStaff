<app-drag-drop-area (filesDropped)="onFilesDropped($event)">
    <div class="storage-page">
        @if (isLoading()) {
            <div class="storage-page__loading">
                <app-spinner [text]="'Loading storage...'" [accentColor]="'#6562f5'" [isOverlay]="false"></app-spinner>
            </div>
        } @else {
            <div class="storage-page__sidebar" [class.storage-page__sidebar--hidden]="!showSidebar()">
                <app-storage-tree
                    [items]="treeData()"
                    (fileSelected)="onFileSelect($event)"
                    (folderSelected)="onFolderSelect($event)"
                    (folderToggled)="onFolderToggle($event)"
                    (contextAction)="onContextAction($event)"
                    (closeSidebar)="toggleSidebar()"
                    (openCreateFolder)="onOpenCreateFolder($event)"
                />
            </div>
            <div class="storage-page__content">
                <app-storage-preview
                    [item]="selectedFile()"
                    [showSidebar]="showSidebar()"
                    (toggleSidebar)="toggleSidebar()"
                    (contextAction)="onContextAction($event)"
                />
            </div>
        }
    </div>
</app-drag-drop-area>
