<div class="configure-models-dialog">
  <header class="configure-models-dialog__header">
    <div class="configure-models-dialog__header-left">
      <i class="configure-models-dialog__title-icon ti ti-brain" aria-hidden="true"></i>
      <div class="configure-models-dialog__title">Configure Models</div>
    </div>

    <app-close-icon-button (onClick)="close()"></app-close-icon-button>
  </header>

  <nav class="configure-models-dialog__tabs">
    @for (tab of tabs; track tab.id; let isLast = $last) {
      <button
        type="button"
        class="configure-models-dialog__tab"
        [class.configure-models-dialog__tab--active]="activeTabId() === tab.id"
        (click)="selectTab(tab.id)"
      >
        <i
          class="configure-models-dialog__tab-icon"
          [ngClass]="tab.iconClass"
          aria-hidden="true"
        ></i>
        {{ tab.label }}
      </button>
      @if (!isLast) {
        <span class="configure-models-dialog__tabs-separator" >/</span>
      }
    }
  </nav>

  <main class="configure-models-dialog__content">
    @switch (activeTabId()) {
      @case (tabIds.QUICKSTART) {
        <section class="configure-models-dialog__panel">
          <app-quickstart-section></app-quickstart-section>
        </section>
      }
      @case (tabIds.DEFAULT_LLMS) {
        <section class="configure-models-dialog__panel" >
          <app-default-llms-section></app-default-llms-section>
        </section>
      }
      @case (tabIds.LLM_LIBRARY) {
        <section class="configure-models-dialog__panel">
          <app-llm-library-section></app-llm-library-section>
        </section>
      }
    }
  </main>
</div>
