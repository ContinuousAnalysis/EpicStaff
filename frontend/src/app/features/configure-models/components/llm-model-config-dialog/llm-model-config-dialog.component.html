<div class="dialog">
    <div class="header">
        <h2 class="title">
            Add LLM Configuration
        </h2>
        <app-icon-button
            icon="ui/x"
            ariaLabel="Close dialog"
            size="2rem"
            (onClick)="dialogRef.close()"
        >
        </app-icon-button>
    </div>

    <div
        class="form"
        [formGroup]="form"
    >
        <section class="section">
            <h3 class="title">
                MODEL INFORMATION
            </h3>
            <app-llm-model-selector
                label="Provider"
                placeholder="Select provider"
                tooltipText="Provider"
                [required]="true"
                (modelChanged)="onModelChanged($event)"
            />
            <div>
                <app-custom-input
                    formControlName="api_key"
                    label="API Key"
                    placeholder="Enter provider's API key"
                    tooltipText="Api key"
                    type="password"
                />
                <app-validation-errors
                    [control]="form.get('api_key')!"
                />
            </div>
            <div>
                <app-custom-input
                    formControlName="custom_name"
                    label="Configuration Name"
                    placeholder="Enter a custom name"
                    tooltipText="config name"
                    [required]="true"
                />
                <app-validation-errors
                    [control]="form.get('custom_name')!"
                />
            </div>
        </section>

        <section class="section">
            <h3 class="title">
                API CONFIGURATION
            </h3>
            <app-key-value-list
                formControlName="headers"
                label="Header Configuration"
                tooltipText="Header config"
                namePlaceholder="Header name"
                valuePlaceholder="Header value"
            />
        </section>

        <section class="section">
            <h3 class="title">
                GENERATION PARAMETERS
            </h3>
            <div>
                <app-slider-with-stepper
                    formControlName="temperature"
                    label="Temperature"
                    tooltipText="Temperature"
                />
                <app-validation-errors
                    [control]="form.get('temperature')!"
                />
            </div>
            <div>
                <app-slider-with-stepper
                    formControlName="top_p"
                    label="Top P"
                    tooltipText="Top P"
                />
                <app-validation-errors
                    [control]="form.get('top_p')!"
                />
            </div>
            <div>
                <app-slider-with-stepper
                    formControlName="presence_penalty"
                    label="Presence Penalty"
                    tooltipText="Presence Penalty"
                />
                <app-validation-errors
                    [control]="form.get('presence_penalty')!"
                />
            </div>
            <div>
                <app-slider-with-stepper
                    formControlName="frequency_penalty"
                    label="Frequency Penalty"
                    tooltipText="Frequency Penalty"
                />
                <app-validation-errors
                    [control]="form.get('frequency_penalty')!"
                />
            </div>
        </section>

        <section class="section">
            <h3 class="title">
                TOKEN LIMITS & COMPLETION
            </h3>
            <div>
                <app-input-number
                    formControlName="max_tokens"
                    label="Max Tokens"
                    tooltipText="Max tokens"
                    [alwaysShowSteps]="true"
                />
                <app-validation-errors
                    [control]="form.get('max_tokens')!"
                />
            </div>
            <div>
                <app-input-number
                    formControlName="timeout"
                    label="Timeout (seconds)"
                    tooltipText="Timeout (seconds)"
                    [alwaysShowSteps]="true"
                />
                <app-validation-errors
                    [control]="form.get('timeout')!"
                />
            </div>
        </section>

        <section class="section">
            <h3 class="title">
                ADVANCED PARAMETERS
            </h3>
            <div>
                <app-input-number
                    formControlName="seed"
                    placeholder="random"
                    label="Seed"
                    tooltipText="Seed"
                    [alwaysShowSteps]="true"
                />
                <app-validation-errors
                    [control]="form.get('seed')!"
                />
            </div>
            <app-textarea
                label="Logit Bias (JSON)"
                tooltipText="Logit Bias (JSON)"
                placeholder='{"50256": -100}'
            />
        </section>
    </div>

    <div class="footer">
        <app-button
            type="outline-primary"
            (click)="onCancel()"
        >
            Cancel
        </app-button>
        <app-button
            type="primary"
            [disabled]="form.invalid || isSaving()"
            (click)="onSave()"
        >
            Add LLM
        </app-button>
    </div>
</div>
