<div class="dialog-container">
    <!-- Header Section -->
    <div class="header">
        <div class="icon-and-title">
            <i class="ti ti-settings"></i>
            <h2 class="dialog-title">
                Advanced Settings for {{ data.agentRole }}
            </h2>
        </div>
        <app-icon-button
            icon="ui/x"
            ariaLabel="Close dialog"
            size="2rem"
            (onClick)="dialogRef.close()"
        >
        </app-icon-button>
    </div>
    <div class="tabs">
        @for (tab of tabs; track tab.id) {
            <app-tab-button
                [mod]="'sm'"
                [active]="tab.id === activeTab()"
                (click)="activeTab.set(tab.id)"
            >
                {{ tab.label }}
            </app-tab-button>
            @if (!$last) {
                <div class="divider">/</div>
            }
        }
    </div>

    <!-- Scrollable Content -->
    <div class="scrollable-content">
        @switch (activeTab()) {
            @case (TabId.GENERAL) {
                <app-general-tab
                    [form]="form"
                    [combinedLLMs]="combinedLLMs"
                />
            }
            @case (TabId.RAG) {
                <app-rag-tab
                    [form]="form"
                    [allKnowledgeSources]="allKnowledgeSources"
                    [agentRags]="agentRags"
                    [searchConfigs]="data.search_configs"
                />
            }
<!--            @case (TabId.LLM_PARAMS) {-->
<!--                <app-llm-params-tab-->
<!--                    [form]="form"-->
<!--                />-->
<!--            }-->
            @case (TabId.EXECUTION) {
                <app-execution-tab
                    [form]="form"
                />
            }
            @case (TabId.ADVANCED) {
                <app-advanced-tab
                    [form]="form"
                />
            }
        }
    </div>

    <!-- Action Buttons -->
    <div class="actions">
        <button class="btn-cancel" (click)="dialogRef.close()">Cancel</button>
        <button class="btn-save" [disabled]="form.invalid" (click)="save()">Save Changes</button>
    </div>
</div>
